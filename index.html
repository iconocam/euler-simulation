<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fields of Decay — An Euler Essay in Motion</title>
<style>
     *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #030810;
    --panel:   rgba(4, 18, 38, 0.85);
    --border:  rgba(0, 200, 255, 0.10);
    --text:    rgba(140, 200, 255, 0.80);
    --dim:     rgba(80, 130, 180, 0.55);
    --accent:  #00ffcc;
    --warn:    #ffaa00;
    --red:     #ff3200;
    --font:    'Courier New', 'Lucida Console', monospace;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.75;
    min-height: 100vh;
    overflow-x: hidden;
  }

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.06) 2px,
      rgba(0, 0, 0, 0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

   .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 80px 32px 120px;
  }

  .masthead {
    margin-bottom: 64px;
  }

   .masthead .series-label {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 20px;
  }

  .masthead h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: normal;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0, 255, 204, 0.25);
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .masthead .subtitle {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-bottom: 32px;
  }

  .masthead p {
    color: var(--text);
    max-width: 600px;
    margin-bottom: 16px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 48px 0;
  }

.section-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 32px;
  }

<body>

</body>
</html>
